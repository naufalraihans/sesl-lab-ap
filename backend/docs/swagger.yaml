      user:
        type: integer
    type: object
  dto.PedomanRequest:
    properties:
      file_url:
        type: string
      nama_dokumen:
        type: string
    required:
    - file_url
    - nama_dokumen
    type: object
  dto.RegisterOpenRequest:
    properties:
