        type: array
      total:
        type: integer
    type: object
  dto.RekapKelasResponse:
    properties:
      columns:
        items:
          $ref: '#/definitions/dto.RekapKolom'
        type: array
      data:
        items:
          $ref: '#/definitions/dto.RekapMahasiswa'
        type: array
    type: object
  dto.RekapKolom:
    properties:
      key:
        description: identifier unik course, misal "course_1"
        type: string
      label:
        description: label human-readable, misal "Modul 1 - Pre-test"
        type: string
    type: object
  dto.RekapMahasiswa:
    properties:
      nama:
        type: string
      nim:
        type: string
      scores:
        additionalProperties:
          format: float64
          type: number
        description: 'Key: course_id, Value: total nilai'
        type: object
      total_score:
        type: number
    type: object
  dto.RekapResponse:
    properties:
      aktivasi_sesi_id:
        type: integer
