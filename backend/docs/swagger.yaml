      sesi_judul:
        type: string
      status:
        type: string
      total_nilai:
        type: number
    type: object
  dto.NilaiRequest:
    properties:
      feedback:
        type: string
      jawaban_id:
        type: integer
      nilai:
        minimum: 0
        type: number
    required:
