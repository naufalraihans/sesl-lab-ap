basePath: /api
definitions:
  dto.AIGradingBulkRequest:
    properties:
      aktivasi_sesi_id:
        type: integer
      course_id:
        type: integer
    required:
    - aktivasi_sesi_id
    - course_id
    type: object
  dto.AIGradingJobResponse:
    properties:
      job_id:
        type: string
      message:
        type: string
      processed:
        type: integer
      status:
        description: queued, processing, completed, failed
        type: string
      total:
        type: integer
    type: object
  dto.AktivasiRequest:
    properties:
      gacha_pilihan:
        description: |-
          GachaPilihan: "pretest" atau "posttest" (course mana yang dipakai untuk sesi normal).
          Kosong/diabaikan untuk sesi ujian praktik.
        enum:
        - pretest
        - posttest
        type: string
      kelas_id:
        type: integer
      sesi_praktikum_id:
        type: integer
      shift:
        enum:
        - 1
        - 2
        type: integer
    required:
    - kelas_id
    - sesi_praktikum_id
    - shift
    type: object
  dto.AmpuanRequest:
    properties:
      asisten_id:
        type: integer
      kelas_id:
        type: integer
      kelompok:
        type: string
    required:
    - asisten_id
    - kelas_id
    - kelompok
    type: object
  dto.AsistenRequest:
    properties:
      foto_url:
        type: string
      medsos_link:
        type: string
      nama:
        type: string
      nim:
        type: string
      nomor_hp:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - nama
    - nim
    type: object
  dto.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.AutoSaveRequest:
    properties:
      jawaban_teks:
        type: string
      soal_terpilih_id:
        type: integer
    required:
    - soal_terpilih_id
    type: object
  dto.BukaTutupCourseRequest:
    properties:
      aktivasi_course_id:
        type: integer
      is_open:
        type: boolean
    required:
    - aktivasi_course_id
    type: object
  dto.BulkActionRequest:
    properties:
      action:
        enum:
        - delete
        - reset_nilai
        type: string
      jawaban_ids:
        items:
          type: integer
        minItems: 1
        type: array
    required:
    - action
    - jawaban_ids
    type: object
  dto.BulkResponse:
    properties:
      total_inserted:
        type: integer
      total_processed:
        type: integer
      total_updated:
        type: integer
    type: object
  dto.CekNIMRequest:
    properties:
      nim:
        type: string
    required:
    - nim
    type: object
  dto.CekNIMResponse:
    properties:
      ditemukan:
        type: boolean
      is_register_open:
        type: boolean
      is_registered:
        type: boolean
      nama:
        type: string
      nim:
        type: string
      pesan:
        type: string
    type: object
  dto.CourseProgressInfo:
    properties:
      belum:
        type: integer
      course_id:
        type: integer
      is_open:
        type: boolean
      jenis:
        type: string
      sedang:
        type: integer
      selesai:
        type: integer
    type: object
  dto.CourseRequest:
    properties:
      deskripsi:
        type: string
      durasi_menit:
        minimum: 1
        type: integer
      jenis:
        enum:
        - pretest
        - posttest
        - keterampilan
        - ujian_praktik
        type: string
      judul:
        type: string
    required:
    - durasi_menit
    - jenis
    type: object
  dto.CourseUserItem:
    properties:
      aktivasi_course_id:
        type: integer
      course_id:
        type: integer
      durasi_menit:
        type: integer
      is_open:
        type: boolean
      jenis:
        type: string
      judul:
        type: string
      status:
        type: string
      total_nilai:
        type: number
    type: object
  dto.DashboardUserResponse:
    properties:
      jadwal:
        $ref: '#/definitions/dto.JadwalInfo'
      profil:
        $ref: '#/definitions/dto.UserResponse'
      riwayat_nilai:
        items:
          $ref: '#/definitions/dto.NilaiCourseItem'
        type: array
      sesi_aktif:
        items:
          $ref: '#/definitions/dto.SesiUserItem'
        type: array
    type: object
  dto.JadwalInfo:
    properties:
      hari:
        type: string
      jam_mulai:
        type: string
      jam_selesai:
        type: string
      keterangan:
        type: string
    type: object
  dto.JadwalRequest:
    properties:
      hari:
        type: string
      jam_mulai:
        type: string
      jam_selesai:
        type: string
      kelas_id:
        type: integer
      keterangan:
        type: string
      shift:
        enum:
        - 1
        - 2
        type: integer
    required:
    - hari
    - jam_mulai
    - jam_selesai
    - kelas_id
    - shift
    type: object
  dto.KelasRequest:
    properties:
      nama_kelas:
        type: string
    required:
    - nama_kelas
    type: object
  dto.KonfigurasiRequest:
    properties:
      key:
        type: string
      value:
        type: string
    required:
    - key
    type: object
  dto.LoginRequest:
    properties:
      nim:
        type: string
      password:
        type: string
    required:
    - nim
    - password
    type: object
  dto.MulaiCourseRequest:
    properties:
      aktivasi_sesi_id:
        type: integer
      course_id:
        type: integer
      token:
        type: string
    required:
    - aktivasi_sesi_id
    - course_id
    type: object
  dto.NilaiCourseItem:
    properties:
      jenis:
