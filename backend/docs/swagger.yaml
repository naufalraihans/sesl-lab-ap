host: localhost:8080
info:
  contact:
    email: naufalraihans@example.com
    name: Developer
  description: REST API Documentation for Web Lab-AP v3
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Lab-AP API
  version: "1.0"
paths:
  /admin/aktivasi:
    get:
      description: Mengambil daftar seluruh sesi yang sedang/pernah diaktifkan
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.AktivasiSesi'
                  type: array
              type: object
      security:
      - bearerAuth: []
      summary: Daftar aktivasi
      tags:
      - Admin - Aktivasi
    post:
      consumes:
      - application/json
      description: Mengaktifkan sesi untuk kelas tertentu dan melakukan gacha soal
        pretest/posttest/ujian
      parameters:
      - description: Payload Aktivasi
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AktivasiRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/entity.AktivasiSesi'
              type: object
      security:
      - bearerAuth: []
      summary: Mengaktifkan sesi praktikum (Gacha Soal)
      tags:
      - Admin - Aktivasi
  /admin/aktivasi-course/buka-tutup:
    post:
      consumes:
      - application/json
      description: Membuka atau menutup course. Jika ditutup, akan melakukan auto-submit
        massal.
      parameters:
      - description: Payload Buka Tutup
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BukaTutupCourseRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  type: string
              type: object
      security:
      - bearerAuth: []
