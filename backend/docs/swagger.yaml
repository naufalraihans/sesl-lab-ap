      is_submitted:
        type: boolean
      jawaban_id:
        type: integer
      jawaban_teks:
        type: string
      jenis_course:
        type: string
      jenis_soal:
        type: string
      judul_course:
        type: string
      judul_sesi:
        type: string
      kelas_id:
        type: integer
      nama_kelas:
        type: string
      nama_mahasiswa:
        type: string
      nilai:
        type: number
      nim:
        type: string
      poin_maksimal:
        type: number
      sesi_praktikum_id:
        type: integer
      teks_soal:
        type: string
      waktu_submit:
        type: string
