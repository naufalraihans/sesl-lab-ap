openapi: 3.0.3
info:
  title: Laboratorium Algoritma dan Pemrograman API
  description: >
    REST API untuk sistem praktikum Lab Algoritma & Pemrograman.
    Backend Go (Clean Architecture) + GORM/MySQL, JWT auth, server stateful
    (online registry in-memory + background auto-submit).
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local
  - url: https://lab-ap.vercel.app
    description: Production (frontend)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Envelope:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        data: {}
        error: {}

security:
  - bearerAuth: []

paths:
  /api/health:
    get:
      summary: Health check
      security: []
      responses:
        "200": { description: OK }

  /api/auth/cek-nim:
    post:
      summary: Cek status NIM (langkah 1 first-time login)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { nim: { type: string } }
      responses:
        "200": { description: Status NIM (login/register/ditolak) }

  /api/auth/login:
    post:
      summary: Login (NIM + password)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nim: { type: string }
                password: { type: string }
      responses:
        "200": { description: Token + user }
        "401": { description: Kredensial salah }

  /api/auth/register:
    post:
      summary: First-time register (set password jika akses dibuka)
      security: []
      responses:
        "201": { description: Berhasil }
        "403": { description: Akses register belum dibuka }

  /api/auth/logout:
    post:
      summary: Logout (hapus dari registry online)
      responses: { "200": { description: OK } }

  /api/auth/me:
    get:
      summary: Profil user terautentikasi
      responses: { "200": { description: OK } }

  /api/info/asisten:
    get: { summary: Daftar asisten (publik), security: [], responses: { "200": { description: OK } } }
  /api/info/laporan:
    get: { summary: Daftar pedoman laporan (publik), security: [], responses: { "200": { description: OK } } }
  /api/info/modul:
    get: { summary: URL file modul (publik), security: [], responses: { "200": { description: OK } } }
  /api/info/jadwal:
    get: { summary: Tabel jadwal internal (publik), security: [], responses: { "200": { description: OK } } }

  /api/praktikum/dashboard:
    get: { summary: Dashboard mahasiswa, responses: { "200": { description: OK } } }
  /api/praktikum/sesi:
    get: { summary: Daftar sesi mahasiswa, responses: { "200": { description: OK } } }
  /api/praktikum/ruang:
    get:
      summary: Ruang pengerjaan course (soal + timer)
      parameters:
        - { name: aktivasi_sesi_id, in: query, required: true, schema: { type: integer } }
        - { name: course_id, in: query, required: true, schema: { type: integer } }
      responses: { "200": { description: OK }, "403": { description: Tidak punya akses } }
  /api/praktikum/mulai:
    post: { summary: Mulai mengerjakan (set timer server-side), responses: { "200": { description: OK } } }
  /api/praktikum/autosave:
    post: { summary: Auto-save jawaban per soal, responses: { "200": { description: OK }, "403": { description: Waktu habis/ditutup } } }
  /api/praktikum/submit:
    post: { summary: Submit manual seluruh course, responses: { "200": { description: OK } } }

  /api/admin/dashboard:
    get: { summary: Statistik dashboard admin, responses: { "200": { description: OK } } }
  /api/admin/dashboard/online:
    get: { summary: Jumlah user online real-time (registry in-memory), responses: { "200": { description: OK } } }
  /api/admin/users:
    get: { summary: Daftar mahasiswa, responses: { "200": { description: OK } } }
    post: { summary: Tambah mahasiswa, responses: { "201": { description: OK } } }
  /api/admin/aktivasi:
    get: { summary: Daftar aktivasi, responses: { "200": { description: OK } } }
    post: { summary: Aktifkan sesi + gacha pretest/posttest, responses: { "201": { description: OK } } }
  /api/admin/aktivasi-course/buka-tutup:
    post: { summary: Buka/tutup course per aktivasi (tutup = auto-submit massal), responses: { "200": { description: OK } } }
  /api/admin/penilaian:
    post: { summary: Set nilai per jawaban (0..poin) + recalc total, responses: { "200": { description: OK } } }
  /api/admin/penilaian/rekap:
    get: { summary: Rekap jawaban per aktivasi+course, responses: { "200": { description: OK } } }
  /api/admin/upload:
    post: { summary: Upload file ke Supabase Storage (multipart), responses: { "201": { description: OK } } }
